apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-ingress-rules # <-- Nombre de la tarjeta
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/marcsal/platform-idp-demo' # Tu repo
    targetRevision: HEAD
    path: k8s/02-ingress # <-- Solo vigila tus Ingress
    plugin:
      name: argocd-vault-plugin
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true