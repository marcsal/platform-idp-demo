apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-web-business # <-- Nombre de la tarjeta
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/marcsal/platform-idp-demo'
    targetRevision: HEAD
    path: k8s/03-apps # <-- Solo vigila los Deployments/Services
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true