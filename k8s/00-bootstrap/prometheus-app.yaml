apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observabilidad-stack
  namespace: argocd
spec:
  project: default
  sources:
    # 1. El Helm Oficial de Prometheus
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      chart: kube-prometheus-stack
      targetRevision: 59.1.0
    # 2. Tus Ingress locales de monitorización
    - repoURL: 'https://github.com/marcsal/platform-idp-demo'
      targetRevision: HEAD
      path: k8s/04-monitoring-ingresses
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    jsonPointers:
    - /status/terminatingReplicas
  - group: apps
    kind: Deployment
    jsonPointers:
    - /status/terminatingReplicas