apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-infra-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Ola 1: Queremos que esto se cree lo primerísimo
spec:
  project: default
  source:
    repoURL: 'https://github.com/marcsal/platform-idp-demo'
    targetRevision: HEAD
    path: k8s/01-base # Apunta a tu carpeta base
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true