apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idp-docs-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: docs.34.175.98.1.nip.io # <-- URL de tu nueva app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: idp-docs-service
            port:
              number: 80